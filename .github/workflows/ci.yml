name: Rust

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Required so the workspace can pull darwin-baskets via SSH.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        working-directory: rust

  clippy-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # darwin-baskets is a private cross-repo dep. Without a deploy
      # key the cross-repo cargo fetch fails; the workflow is
      # nonetheless useful locally and once the org's repos go public.
      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rust
        continue-on-error: true
      - run: cargo test --all-features
        working-directory: rust
        continue-on-error: true
