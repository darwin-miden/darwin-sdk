version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      miden:
        patterns:
          - "miden-*"
      cargo:
        patterns:
          - "*"
        exclude-patterns:
          - "miden-*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
